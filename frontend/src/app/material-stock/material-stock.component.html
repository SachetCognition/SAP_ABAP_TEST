<div class="container">
  <!-- Report header (replaces set_list_header at ZMAT_REPORT.PROG line 242) -->
  <div class="report-header">{{ reportHeader }}</div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="form-row">
      <mat-form-field appearance="outline">
        <mat-label>Material Number(s)</mat-label>
        <input matInput formControlName="matnr" placeholder="Comma-separated, e.g. MAT001,MAT002">
        <mat-hint>Maps to s_matnr SELECT-OPTIONS</mat-hint>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Material Type(s)</mat-label>
        <input matInput formControlName="mtart" placeholder="e.g. FERT,HALB,ROH">
        <mat-hint>Maps to s_mtart SELECT-OPTIONS</mat-hint>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Plant</mat-label>
        <input matInput formControlName="plant" placeholder="e.g. 1000">
        <mat-hint>Maps to p_werks</mat-hint>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Language</mat-label>
        <mat-select formControlName="language">
          <mat-option *ngFor="let lang of languages" [value]="lang.value">
            {{ lang.label }}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Top N</mat-label>
        <input matInput type="number" formControlName="top" min="0">
        <mat-hint>0 = no limit</mat-hint>
      </mat-form-field>

      <mat-checkbox formControlName="byPlant" class="by-plant-checkbox">
        Show by Plant
      </mat-checkbox>
    </div>

    <div class="button-row">
      <button mat-raised-button color="primary" type="submit">
        <mat-icon>search</mat-icon> Execute Report
      </button>
      <button mat-raised-button type="button" (click)="exportCsv()">
        <mat-icon>download</mat-icon> Export CSV
      </button>
    </div>
  </form>

  <!-- No data message (replaces ZMAT_REPORT.PROG line 179-181) -->
  <div *ngIf="noDataMessage" class="message-area info">
    {{ noDataMessage }}
  </div>

  <!-- AG Grid (replaces CL_SALV_TABLE ALV) -->
  <div class="grid-container ag-theme-alpine">
    <ag-grid-angular
      style="width: 100%; height: 100%;"
      [rowData]="rowData"
      [columnDefs]="columnDefs"
      [defaultColDef]="defaultColDef"
      [pinnedBottomRowData]="pinnedBottomRowData"
      (gridReady)="onGridReady($event)"
      [animateRows]="true">
    </ag-grid-angular>
  </div>
</div>
