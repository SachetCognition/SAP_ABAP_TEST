name: Test Artifacts CI

on:
  push:
    branches: [main, 'devin/**']
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Back-End Tests (Java / Spring Boot)
  # ---------------------------------------------------------------------------
  backend-tests:
    name: Back-End Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run Maven tests
        run: mvn test --batch-mode --fail-at-end
        continue-on-error: true

      - name: Upload JUnit reports (Phase 2)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase2-junit-reports
          path: |
            **/target/surefire-reports/*.xml
            test-artifacts/phase2-backend/junit-reports/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload JUnit reports (Phase 3)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase3-junit-reports
          path: |
            **/target/failsafe-reports/*.xml
            test-artifacts/phase3-backend/junit-reports/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload Postman exports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postman-exports
          path: |
            test-artifacts/phase2-backend/postman/
            test-artifacts/phase3-backend/postman/
          retention-days: 30
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Front-End E2E Tests (Cypress)
  # ---------------------------------------------------------------------------
  frontend-e2e:
    name: Front-End E2E Tests (Cypress)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start application (background)
        run: npm start &
        env:
          CI: true

      - name: Wait for application to be ready
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Run Cypress E2E tests
        uses: cypress-io/github-action@v6
        with:
          install: false
          wait-on: http://localhost:3000
          config: |
            video=true
            screenshotOnRunFailure=true
            videosFolder=test-artifacts/phase5-frontend/videos
            screenshotsFolder=test-artifacts/phase5-frontend/screenshots
        continue-on-error: true

      - name: Upload Cypress screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: |
            test-artifacts/phase4-frontend/screenshots/
            test-artifacts/phase5-frontend/screenshots/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload Cypress videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: |
            test-artifacts/phase4-frontend/videos/
            test-artifacts/phase5-frontend/videos/
          retention-days: 30
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Cross-Validation Diff Reports (Phase 6)
  # ---------------------------------------------------------------------------
  cross-validation:
    name: Cross-Validation Diff Reports
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-e2e]
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run cross-validation script
        run: |
          if [ -f scripts/cross-validate.js ]; then
            node scripts/cross-validate.js \
              --sap-csv test-artifacts/phase0-baseline/csv-exports/ \
              --output test-artifacts/phase6-xvalidation/diff-reports/
          else
            echo "Cross-validation script not yet implemented -- skipping"
          fi
        continue-on-error: true

      - name: Upload diff reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase6-diff-reports
          path: test-artifacts/phase6-xvalidation/
          retention-days: 30
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Non-Functional Tests (Phase 7)
  # ---------------------------------------------------------------------------
  non-functional:
    name: Non-Functional Tests
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-e2e]
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload non-functional test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase7-nonfunctional
          path: test-artifacts/phase7-nonfunctional/
          retention-days: 30
          if-no-files-found: ignore
